apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.mediamtx.replicas }}
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      containers:
        - name: mediamtx
          image: {{ .Values.mediamtx.image }}
          ports:
            - containerPort: 8554
              name: rtsp-tcp
            - containerPort: 8889
              name: webrtc-http
            - containerPort: 8189
              name: webrtc-udp
              protocol: UDP
            - containerPort: 9997
              name: api
          # CORRECTION : ConfigMap montée (manquait dans le package original)
          volumeMounts:
            - name: config-volume
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
          resources:
            requests:
              memory: {{ .Values.mediamtx.resources.requests.memory | quote }}
              cpu: {{ .Values.mediamtx.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.mediamtx.resources.limits.memory | quote }}
              cpu: {{ .Values.mediamtx.resources.limits.cpu | quote }}
      volumes:
        - name: config-volume
          configMap:
            name: mediamtx-config

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: human-detector-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.detector.replicas }}
  selector:
    matchLabels:
      app: human-detector
  template:
    metadata:
      labels:
        app: human-detector
    spec:
      containers:
        - name: human-detector
          image: {{ .Values.detector.image }}
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: VIDEO_URL
              value: {{ .Values.detector.env.VIDEO_URL | quote }}
            - name: VIDEO_USER
              value: {{ .Values.detector.env.VIDEO_USER | quote }}
            - name: VIDEO_PASS
              value: {{ .Values.detector.env.VIDEO_PASS | quote }}
            - name: MODEL_PATH
              value: {{ .Values.detector.env.MODEL_PATH | quote }}
            - name: CONFIDENCE_THRESHOLD
              value: {{ .Values.detector.env.CONFIDENCE_THRESHOLD | quote }}
            - name: DETECTION_INTERVAL
              value: {{ .Values.detector.env.DETECTION_INTERVAL | quote }}
            - name: ALERT_COOLDOWN
              value: {{ .Values.detector.env.ALERT_COOLDOWN | quote }}
            - name: SAVE_IMAGES
              value: {{ .Values.detector.env.SAVE_IMAGES | quote }}
            - name: EMAIL_USER
              value: {{ .Values.detector.env.EMAIL_USER | quote }}
            - name: EMAIL_PASS
              value: {{ .Values.detector.env.EMAIL_PASS | quote }}
            - name: TELEGRAM_TOKEN
              value: {{ .Values.detector.env.TELEGRAM_TOKEN | quote }}
            - name: TELEGRAM_CHAT_ID
              value: {{ .Values.detector.env.TELEGRAM_CHAT_ID | quote }}
          resources:
            requests:
              memory: {{ .Values.detector.resources.requests.memory | quote }}
              cpu: {{ .Values.detector.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.detector.resources.limits.memory | quote }}
              cpu: {{ .Values.detector.resources.limits.cpu | quote }}
